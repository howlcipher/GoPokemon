<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GoPokemon - A retro Gameboy styled web application.">
    <title>GoPokemon</title>
    <!-- Use a retro pixel font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gameboy-container">
        <header style="display: flex; justify-content: flex-end;">
            <button id="theme-toggle" aria-label="Toggle dark/light mode">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <main class="screen-border">
            <div class="power-indicator">
                <div class="power-light"></div>
                <span class="power-text">POWER</span>
            </div>
            <div class="screen">
                <!-- Boot Screen -->
                <div id="boot-screen" class="boot-screen">
                    <div class="boot-logo gb-logo">
                        <span class="logo-go" style="color: #444; text-shadow: none;">Go</span><span class="c-1" style="text-shadow: none;">P</span><span class="c-2" style="text-shadow: none;">o</span><span class="c-3" style="text-shadow: none;">k</span><span class="c-4" style="text-shadow: none;">e</span><span class="c-5" style="text-shadow: none;">m</span><span class="c-1" style="text-shadow: none;">o</span><span class="c-2" style="text-shadow: none;">n</span>
                    </div>
                </div>

                <div class="content-wrapper" id="main-screen" style="display: none;">
                    <h2>Welcome to GoPokemon</h2>
                    <div class="sprite-container">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-ii/crystal/transparent/150.png" alt="Retro Pokemon Sprite" class="pokemon-sprite" onerror="this.style.display='none'">
                    </div>
                    <p>Experience the original series aesthetic.</p>
                    
                    <div class="menu" id="main-menu">
                        <button class="menu-btn" id="source-btn" onclick="window.location.href='https://github.com/howlcipher/GoPokemon'">SOURCE CODE</button>
                        <button class="menu-btn selected" id="explore-btn">EXPLORE</button>
                    </div>
                </div>

                <!-- Pokedex Menu Screen -->
                <div class="content-wrapper" id="pokedex-screen" style="display: none;">
                    <h2>Go Concepts</h2>
                    <ul id="concept-list" class="concept-list">
                        <!-- Populated by JS -->
                    </ul>
                    <button class="menu-btn back-btn" id="back-to-main">BACK</button>
                </div>

                <!-- Detail View Screen -->
                <div class="content-wrapper" id="detail-screen" style="display: none;">
                    <h2 id="detail-title">Title</h2>
                    <div class="sprite-container" style="height: 48px; margin-bottom: 5px;">
                        <img id="detail-sprite" src="" alt="Pokemon Sprite" class="pokemon-sprite" style="display: none;">
                    </div>
                    <div class="code-container" id="detail-code">
                        <!-- Code injected here -->
                    </div>
                    <button class="menu-btn back-btn" id="back-to-pokedex">BACK</button>
                </div>
            </div>
            
            <div class="bezel-bottom">
                <h1 class="gb-logo">
                    <span class="logo-go">Go</span><span class="c-1">P</span><span class="c-2">o</span><span class="c-3">k</span><span class="c-4">e</span><span class="c-5">m</span><span class="c-1">o</span><span class="c-2">n</span>
                </h1>
            </div>
        </main>

        <div class="controls">
            <div class="d-pad">
                <div class="d-pad-btn up"></div>
                <div class="d-pad-btn right"></div>
                <div class="d-pad-btn down"></div>
                <div class="d-pad-btn left"></div>
                <div class="d-pad-center"></div>
            </div>
            
            <div class="action-buttons">
                <div class="btn-group">
                    <button class="action-btn b-btn"></button>
                    <span class="btn-label">B</span>
                </div>
                <div class="btn-group">
                    <button class="action-btn a-btn"></button>
                    <span class="btn-label">A</span>
                </div>
            </div>
        </div>

        <div class="system-buttons">
            <div class="sys-btn-group">
                <button class="sys-btn select-btn"></button>
                <span class="sys-btn-label">SELECT</span>
            </div>
            <div class="sys-btn-group">
                <button class="sys-btn start-btn"></button>
                <span class="sys-btn-label">START</span>
            </div>
        </div>
        <div class="speaker-grill"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
