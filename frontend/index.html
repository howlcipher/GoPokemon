<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoPokemon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gameboy-container">
        <header>
            <div class="header-content">
                <h1>GoPokemon</h1>
                <p>Learning Go with Pokémon!</p>
            </div>
            <div class="controls">
                <button id="theme-toggle" class="btn">Theme</button>
                <a href="https://github.com/howlcipher/GoPokemon" target="_blank" class="btn">GitHub</a>
            </div>
        </header>
        
        <main>
            <section class="screen">
                <div class="sprite-container">
                    <img id="mascot" alt="Charmander" class="pixel-art">
                </div>
                <div class="content-box">
                    <h2>Welcome Trainer!</h2>
                    <p>Select a lesson from the Pokedex to begin your Go journey.</p>
                </div>
            </section>
            
            <section class="menu">
                <ul class="lesson-list">
                    <li><a href="#variables">001 Variables</a></li>
                    <li><a href="#operators">002 Operators</a></li>
                    <li><a href="#control-flow">003 Control Flow</a></li>
                    <li><a href="#functions">004 Functions</a></li>
                </ul>
            </section>
        </main>
        
        <footer>
            <p>GoPokemon Project - Gotta Learn 'Em All!</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
